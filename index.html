<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本转换</title>
  <style>
    :root {
      color-scheme: light;
      --surface: rgba(255, 255, 255, 0.8);
      --surface-strong: rgba(255, 255, 255, 0.94);
      --stroke: rgba(15, 23, 42, 0.08);
      --stroke-soft: rgba(255, 255, 255, 0.84);
      --text: #111827;
      --muted: #6b7280;
      --shadow: 0 24px 80px rgba(15, 23, 42, 0.1);
      --radius-shell: 34px;
      --radius-panel: 24px;
      --radius-input: 20px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.96), transparent 30%),
        radial-gradient(circle at right 20%, rgba(226, 232, 240, 0.95), transparent 26%),
        linear-gradient(180deg, #fcfcfd 0%, #f2f4f7 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    .shell {
      width: min(100%, 980px);
      background: var(--surface);
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-shell);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      overflow: hidden;
      position: relative;
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.55), transparent 42%);
      pointer-events: none;
    }

    .hero {
      padding: 26px 34px 12px;
    }

    .title {
      margin: 0 0 8px;
      font-size: clamp(34px, 5vw, 52px);
      line-height: 1;
      letter-spacing: -0.05em;
      font-weight: 700;
      color: #1f2937;
    }

    .subtitle {
      max-width: 620px;
      margin: 0;
      font-size: 15px;
      line-height: 1.7;
      color: var(--muted);
    }

    .workspace {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 20px;
      padding: 8px 24px 24px;
    }

    .panel {
      background: var(--surface-strong);
      border: 1px solid var(--stroke);
      border-radius: var(--radius-panel);
      padding: 24px;
      position: relative;
    }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    .panel-note {
      margin: 6px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    textarea,
    .result-box {
      width: 100%;
      border: 1px solid rgba(15, 23, 42, 0.06);
      border-radius: var(--radius-input);
      background: linear-gradient(180deg, #fbfcfe 0%, #f3f6fa 100%);
      color: var(--text);
      padding: 18px 20px;
      font-size: 16px;
      line-height: 1.8;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    textarea {
      min-height: 320px;
      resize: vertical;
      font-family: inherit;
    }

    textarea:focus {
      border-color: rgba(17, 24, 39, 0.18);
      box-shadow: 0 0 0 6px rgba(17, 24, 39, 0.05);
    }

    textarea::placeholder {
      color: #98a2b3;
    }

    .toolbar {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .segmented {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px;
      border-radius: 999px;
      background: #eef2f6;
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.04);
    }

    button {
      border: 0;
      border-radius: 999px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .mode-button {
      padding: 12px 18px;
      background: transparent;
      color: var(--muted);
    }

    .mode-button.active {
      background: #111827;
      color: #ffffff;
      box-shadow: 0 10px 20px rgba(17, 24, 39, 0.18);
    }

    .ghost-button,
    .copy-button {
      padding: 12px 18px;
      background: #ffffff;
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.08);
    }

    .ghost-button:hover,
    .copy-button:hover,
    .mode-button:hover {
      transform: translateY(-1px);
    }

    .result-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #111827, #94a3b8);
    }

    .result-box {
      min-height: 320px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .result-empty {
      color: #98a2b3;
    }

    .footer {
      margin-top: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .copy-tip {
      min-height: 20px;
    }

    @media (max-width: 900px) {
      .workspace {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .hero {
        padding: 22px 22px 10px;
      }

      .title {
        font-size: 34px;
      }

      .workspace {
        padding: 8px 14px 14px;
      }

      .panel {
        padding: 18px;
      }

      .toolbar,
      .footer,
      .panel-head {
        flex-direction: column;
        align-items: stretch;
      }

      .segmented {
        border-radius: 24px;
      }

      .mode-button,
      .ghost-button,
      .copy-button {
        width: 100%;
      }

      .result-meta {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1 class="title">文本转换</h1>
      <p class="subtitle">输入英文文本后，选择需要的转换方式，结果会自动显示在右侧并支持一键复制。</p>
    </section>

    <section class="workspace">
      <section class="panel">
        <div class="panel-head">
          <div>
            <h2 class="panel-title">原始文本</h2>
            <p class="panel-note">重点输入区域，支持单词、句子或多段内容</p>
          </div>
        </div>

        <textarea id="sourceText" placeholder="例如：hello world from a more refined interface"></textarea>

        <div class="toolbar">
          <div class="segmented" aria-label="文本转换模式">
            <button class="mode-button active" data-mode="title" type="button">首字母大写</button>
            <button class="mode-button" data-mode="upper" type="button">全部大写</button>
            <button class="mode-button" data-mode="lower" type="button">全部小写</button>
          </div>
          <button class="ghost-button" id="clearButton" type="button">清空文本</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2 class="panel-title">转换结果</h2>
            <p class="panel-note">根据当前模式自动输出处理后的文本</p>
          </div>
          <div class="result-meta">
            <span class="status-dot"></span>
            <span id="modeLabel">当前模式：首字母大写</span>
          </div>
        </div>

        <div class="result-box result-empty" id="resultText">转换后的文本会显示在这里</div>

        <div class="footer">
          <div class="copy-tip" id="copyTip">输入内容后即可生成结果</div>
          <button class="copy-button" id="copyButton" type="button">复制结果</button>
        </div>
      </section>
    </section>
  </main>

  <script>
    const sourceText = document.getElementById("sourceText");
    const resultText = document.getElementById("resultText");
    const copyButton = document.getElementById("copyButton");
    const copyTip = document.getElementById("copyTip");
    const clearButton = document.getElementById("clearButton");
    const modeLabel = document.getElementById("modeLabel");
    const actionButtons = document.querySelectorAll("[data-mode]");

    const modeNames = {
      title: "首字母大写",
      upper: "全部大写",
      lower: "全部小写"
    };

    let currentMode = "title";

    function toTitleCase(text) {
      return text.replace(/\b([a-z])/gi, (match) => match.toUpperCase());
    }

    function transformText(text, mode) {
      if (!text.trim()) {
        return "";
      }

      if (mode === "upper") {
        return text.toUpperCase();
      }

      if (mode === "lower") {
        return text.toLowerCase();
      }

      return toTitleCase(text.toLowerCase());
    }

    function renderResult() {
      const value = transformText(sourceText.value, currentMode);
      const hasValue = Boolean(value);

      resultText.textContent = hasValue ? value : "转换后的文本会显示在这里";
      resultText.classList.toggle("result-empty", !hasValue);
      modeLabel.textContent = "当前模式：" + modeNames[currentMode];
      copyTip.textContent = hasValue ? "结果已同步更新" : "输入内容后即可生成结果";
    }

    actionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        currentMode = button.dataset.mode;

        actionButtons.forEach((item) => {
          item.classList.toggle("active", item === button);
        });

        renderResult();
      });
    });

    sourceText.addEventListener("input", renderResult);

    clearButton.addEventListener("click", () => {
      sourceText.value = "";
      renderResult();
      sourceText.focus();
    });

    copyButton.addEventListener("click", async () => {
      const value = transformText(sourceText.value, currentMode);

      if (!value) {
        copyTip.textContent = "当前没有可复制的结果";
        return;
      }

      try {
        await navigator.clipboard.writeText(value);
        copyTip.textContent = "复制成功";
      } catch (error) {
        copyTip.textContent = "复制失败，请手动复制";
      }
    });

    renderResult();
  </script>
</body>
</html>
